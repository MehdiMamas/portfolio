<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <title>Data Scrapped</title>
</head>

<body style="background-color: #325b62 !important;color: white;">
    <div id="app" style=" width:800px;transform:translateX(-50%);margin-left:50%;margin-top:20px;">
        <h3>Search term : {{title}}</h3>
        <h3>Number of articles : {{articlesLength}}</h3>
        <table class="table">
            <thead class="thead-dark">
                <tr>
                    <th scope="col">Aritcle Link</th>
                    <th scope="col">Number of votes</th>
                </tr>
            </thead>
            <tbody style=" background:white;color:black;">
                <tr v-for="(item, index) in data" :key="index">
                    <td><a :href="item.text">{{item.text}}</a> </td>
                    <td @click="linksWhoVoted">{{item.votedOn.length}}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="./js/vue.min.js"></script>
    <script src="./js/index2.js"></script>
    <script src="./js/bootstrap.min.js"></script>
</body>

</html>
