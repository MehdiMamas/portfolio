<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <title>Data Scrapped</title>
</head>

<body style="background-color: #325b62 !important;color: white;">
    <div id="app" style=" width:800px;transform:translateX(-50%);margin-left:50%;margin-top:20px;">
        <h3>Exclude List:</h3>
        <input type="text" id="excludeKeyWord">
        <button class="btn btn-dark" id="addBtn">Add</button>
        <table class="table">
            <tbody style="background:white;color:black;">
                <tr style="color: #fff; background-color: #212529; border-color: #32383e;">
                    <th scope="col"
                        style="text-align: center;color: #fff; background-color: #212529; border-color: #32383e;">
                        Your excluded keywords</th>
                    <th scope="col"
                        style="text-align: center;color: #fff; background-color: #212529; border-color: #32383e;"></th>
                </tr>
                <tr v-for="(item, index) in excludeList" :key="index">
                    <td style="width: 70%;">{{item}}</td>
                    <td style="padding: 23px 40px;width: 100px;position: relative;">
                        <button class="btn btn-primary" @click="deleteKeyWord"
                            style="width: 100%;position: absolute;transform: translate(-50%,-50%);">Delete</button>
                    </td>
                </tr>
                <tr style="color: #fff; background-color: #212529; border-color: #32383e;">
                    <th scope="col"
                        style="text-align: center;color: #fff; background-color: #212529; border-color: #32383e;">
                        Permanently excluded keywords</th>
                    <th scope="col"
                        style="text-align: center;color: #fff; background-color: #212529; border-color: #32383e;"></th>
                </tr>
                <tr v-for="(item, index) in permanentExclude" :key="index">
                    <td style="width: 100%;">{{item}}</td>
                    <th scope="col" style="text-align: center;"></th>
                </tr>

            </tbody>
        </table>
    </div>

    <script src="./js/vue.min.js"></script>
    <script src="./js/exclude.js"></script>
    <script src="./js/bootstrap.min.js"></script>
</body>

</html>
